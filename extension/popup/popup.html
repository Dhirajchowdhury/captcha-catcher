<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Captcha Catcher</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="container">

    <div class="header">
      <img src="../icons/icon.png" alt="logo" class="logo" />
      <h1>Captcha Catcher</h1>
    </div>

    <div class="status-card">
      <div class="status-row">
        <span class="status-label">Extension Status</span>
        <label class="toggle">
          <input type="checkbox" id="toggleSwitch" />
          <span class="slider"></span>
        </label>
      </div>
      <p class="status-text" id="statusText">Loading...</p>
    </div>

    <div class="stats-card">
      <h2>Session Stats</h2>
      <div class="stats-grid">
        <div class="stat">
          <span class="stat-number" id="totalSolved">0</span>
          <span class="stat-label">Solved</span>
        </div>
        <div class="stat">
          <span class="stat-number" id="avgTime">0ms</span>
          <span class="stat-label">Avg Speed</span>
        </div>
        <div class="stat">
          <span class="stat-number" id="successRate">0%</span>
          <span class="stat-label">Success Rate</span>
        </div>
      </div>
    </div>

    <div class="log-card">
      <h2>Recent Activity</h2>
      <ul class="log-list" id="logList">
        <li class="log-empty">No activity yet</li>
      </ul>
    </div>

    <div class="footer">
      <span>v1.0</span>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
